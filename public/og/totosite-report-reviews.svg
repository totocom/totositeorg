<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">토토사이트 후기 데이터 리포트 공유 이미지</title>
  <desc id="desc">이용자 후기와 만족도 평가를 정리하는 리포트형 공유 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.6" stop-color="#111827"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2a3445" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="80" y="72" width="1040" height="486" rx="24" fill="#101827" stroke="#2c3748" filter="url(#shadow)"/>
  <g transform="translate(140 122)">
    <rect width="154" height="38" rx="19" fill="#0f2f27" stroke="#00b67a"/>
    <text x="77" y="25" text-anchor="middle" fill="#78f0bf" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="16" font-weight="700">REVIEW DATA</text>
    <text x="0" y="112" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="58" font-weight="800">후기 데이터 리포트</text>
    <text x="0" y="162" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="25">이용자 만족도와 작성 시점을 함께 확인</text>

    <g transform="translate(0 228)">
      <rect width="270" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <circle cx="42" cy="42" r="18" fill="#0f2f27" stroke="#00b67a"/>
      <path d="M34 42l7 7 14-17" fill="none" stroke="#7af3bd" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="78" y="45" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="800">만족도 평가</text>
      <text x="78" y="78" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">평점보다 세부 응답 중심</text>
    </g>
    <g transform="translate(300 228)">
      <rect width="270" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <circle cx="42" cy="42" r="18" fill="#11253a" stroke="#38bdf8"/>
      <path d="M32 35h20M32 48h28M32 61h18" fill="none" stroke="#b9ecff" stroke-width="5" stroke-linecap="round"/>
      <text x="78" y="45" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="800">작성 맥락</text>
      <text x="78" y="78" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">이용 기간·작성일 비교</text>
    </g>
  </g>
  <g transform="translate(818 130)">
    <rect width="220" height="330" rx="22" fill="#f8fafc"/>
    <rect x="28" y="36" width="116" height="14" rx="7" fill="#111827"/>
    <rect x="28" y="76" width="164" height="42" rx="12" fill="#e7f8f1" stroke="#00b67a"/>
    <rect x="28" y="142" width="164" height="42" rx="12" fill="#eef6ff" stroke="#38bdf8"/>
    <rect x="28" y="208" width="164" height="42" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="28" y="284" width="120" height="10" rx="5" fill="#cbd5e1"/>
  </g>
</svg>
