<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">토토사이트 주소 도메인 기록 공유 이미지</title>
  <desc id="desc">대표 도메인, 변경 이력, DNS WHOIS 정보를 문서와 검색 카드로 표현한 공유 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.6" stop-color="#111827"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2a3445" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="80" y="72" width="1040" height="486" rx="24" fill="#101827" stroke="#2c3748" filter="url(#shadow)"/>
  <g transform="translate(140 122)">
    <rect width="160" height="38" rx="19" fill="#11253a" stroke="#38bdf8"/>
    <text x="80" y="25" text-anchor="middle" fill="#b9ecff" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="16" font-weight="700">DOMAIN LOG</text>
    <text x="0" y="112" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="58" font-weight="800">주소·도메인 기록</text>
    <text x="0" y="162" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="25">대표 도메인, 변경 이력, DNS·WHOIS 참고 정보</text>

    <g transform="translate(0 228)">
      <rect width="270" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <circle cx="42" cy="42" r="18" fill="#11253a" stroke="#38bdf8"/>
      <path d="M28 42h28M42 28v28" fill="none" stroke="#b9ecff" stroke-width="5" stroke-linecap="round"/>
      <text x="78" y="45" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="800">대표 주소</text>
      <text x="78" y="78" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">기준 도메인 확인</text>
    </g>
    <g transform="translate(300 228)">
      <rect width="270" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <circle cx="42" cy="42" r="18" fill="#0f2f27" stroke="#00b67a"/>
      <path d="M31 43h20M31 56h28M31 30h16" fill="none" stroke="#7af3bd" stroke-width="5" stroke-linecap="round"/>
      <text x="78" y="45" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="800">변경 이력</text>
      <text x="78" y="78" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">등록일·운영 기간 비교</text>
    </g>
  </g>
  <g transform="translate(820 138)">
    <rect width="210" height="266" rx="22" fill="#f8fafc"/>
    <circle cx="82" cy="92" r="46" fill="none" stroke="#38bdf8" stroke-width="14"/>
    <path d="M118 128l48 48" fill="none" stroke="#111827" stroke-width="16" stroke-linecap="round"/>
    <rect x="34" y="206" width="142" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="34" y="232" width="112" height="12" rx="6" fill="#cbd5e1"/>
  </g>
</svg>
