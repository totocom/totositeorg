<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">토토사이트 정보 리포트 기본 공유 이미지</title>
  <desc id="desc">어두운 네이비 배경 위에 문서, 체크 표시, 경고 표시, 검색 카드가 배치된 정보 검증 리포트 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172235"/>
      <stop offset="1" stop-color="#101722"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2a3445" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1018" cy="120" r="190" fill="#00b67a" opacity="0.08"/>
  <circle cx="120" cy="530" r="150" fill="#f59e0b" opacity="0.07"/>

  <g transform="translate(80 72)">
    <rect width="1040" height="486" rx="24" fill="url(#panel)" stroke="#2c3748" filter="url(#shadow)"/>
    <rect x="34" y="34" width="972" height="418" rx="18" fill="#0d1522" stroke="#253146"/>

    <g transform="translate(74 72)">
      <rect width="144" height="38" rx="19" fill="#0f2f27" stroke="#00b67a" opacity="0.95"/>
      <text x="72" y="25" text-anchor="middle" fill="#78f0bf" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="16" font-weight="700">DATA REPORT</text>

      <text x="0" y="105" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="58" font-weight="800">토토사이트 정보 리포트</text>
      <text x="0" y="154" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="25" font-weight="500">후기, 먹튀 제보, 주소·도메인 기록을 한곳에서 확인</text>

      <g transform="translate(0 220)">
        <rect width="238" height="104" rx="16" fill="#131d2b" stroke="#2e3a4e"/>
        <circle cx="38" cy="36" r="17" fill="#0f2f27" stroke="#00b67a"/>
        <path d="M30 36l6 6 12-14" fill="none" stroke="#7af3bd" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="70" y="40" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="21" font-weight="800">후기 데이터</text>
        <text x="70" y="72" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">만족도·작성 시점</text>
      </g>

      <g transform="translate(266 220)">
        <rect width="238" height="104" rx="16" fill="#131d2b" stroke="#2e3a4e"/>
        <circle cx="38" cy="36" r="17" fill="#382111" stroke="#f59e0b"/>
        <path d="M38 25v19M38 53h.1" fill="none" stroke="#ffd28a" stroke-width="5" stroke-linecap="round"/>
        <text x="70" y="40" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="21" font-weight="800">먹튀 제보</text>
        <text x="70" y="72" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">피해 유형·발생일</text>
      </g>

      <g transform="translate(532 220)">
        <rect width="238" height="104" rx="16" fill="#131d2b" stroke="#2e3a4e"/>
        <circle cx="38" cy="36" r="17" fill="#11253a" stroke="#38bdf8"/>
        <path d="M29 36h18M38 27v18M50 49l11 11" fill="none" stroke="#b9ecff" stroke-width="4" stroke-linecap="round"/>
        <text x="70" y="40" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="21" font-weight="800">도메인 기록</text>
        <text x="70" y="72" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">주소·변경 이력</text>
      </g>
    </g>

    <g transform="translate(835 104)">
      <rect width="210" height="260" rx="20" fill="#f8fafc"/>
      <rect x="24" y="34" width="90" height="12" rx="6" fill="#111827"/>
      <rect x="24" y="64" width="158" height="10" rx="5" fill="#cbd5e1"/>
      <rect x="24" y="90" width="132" height="10" rx="5" fill="#cbd5e1"/>
      <rect x="24" y="126" width="162" height="48" rx="12" fill="#e7f8f1" stroke="#00b67a"/>
      <path d="M44 151l12 12 28-32" fill="none" stroke="#00a36e" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="24" y="196" width="162" height="12" rx="6" fill="#cbd5e1"/>
      <rect x="24" y="224" width="118" height="12" rx="6" fill="#cbd5e1"/>
    </g>
  </g>
</svg>
