<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">먹튀 제보 리포트 공유 이미지</title>
  <desc id="desc">경고 표시와 공개 승인 데이터를 중심으로 피해 제보를 정리하는 리포트형 공유 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.62" stop-color="#111827"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2a3445" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="80" y="72" width="1040" height="486" rx="24" fill="#101827" stroke="#2c3748" filter="url(#shadow)"/>
  <g transform="translate(140 122)">
    <rect width="150" height="38" rx="19" fill="#382111" stroke="#f59e0b"/>
    <text x="75" y="25" text-anchor="middle" fill="#ffd28a" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="16" font-weight="700">CASE REPORT</text>
    <text x="0" y="112" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="58" font-weight="800">먹튀 제보 리포트</text>
    <text x="0" y="162" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="25">피해 유형, 발생일, 공개 승인 데이터를 중심으로 정리</text>

    <g transform="translate(0 228)">
      <rect width="270" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <circle cx="42" cy="42" r="18" fill="#382111" stroke="#f59e0b"/>
      <path d="M42 31v21M42 62h.1" fill="none" stroke="#ffd28a" stroke-width="5" stroke-linecap="round"/>
      <text x="78" y="45" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="800">피해 유형</text>
      <text x="78" y="78" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">출금 지연·계정 제한 등</text>
    </g>
    <g transform="translate(300 228)">
      <rect width="270" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <circle cx="42" cy="42" r="18" fill="#0f2f27" stroke="#00b67a"/>
      <path d="M33 43l7 7 15-19" fill="none" stroke="#7af3bd" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="78" y="45" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="22" font-weight="800">검토 기준</text>
      <text x="78" y="78" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="15">개인정보 제외·중복 확인</text>
    </g>
  </g>
  <g transform="translate(800 122)">
    <path d="M134 0l134 232H0z" fill="#3b2411" stroke="#f59e0b" stroke-width="5"/>
    <path d="M134 78v70M134 178h.1" fill="none" stroke="#ffd28a" stroke-width="18" stroke-linecap="round"/>
    <rect x="-2" y="270" width="270" height="54" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
    <rect x="28" y="290" width="138" height="12" rx="6" fill="#aeb9c9"/>
    <rect x="28" y="312" width="196" height="8" rx="4" fill="#475569"/>
  </g>
</svg>
