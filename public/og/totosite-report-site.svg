<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">사이트 검증 리포트 공유 이미지</title>
  <desc id="desc">사이트별 후기, 제보, 도메인 정보를 카드 형태로 정리한 검증 리포트 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2a3445" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="80" y="72" width="1040" height="486" rx="24" fill="#101827" stroke="#2c3748" filter="url(#shadow)"/>
  <g transform="translate(140 122)">
