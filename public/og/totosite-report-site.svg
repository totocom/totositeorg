    <g transform="translate(212 228)">
      <rect width="188" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <text x="26" y="42" fill="#ffd28a" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="18" font-weight="800">제보</text>
      <rect x="26" y="62" width="136" height="10" rx="5" fill="#4b5563"/>
      <rect x="26" y="84" width="110" height="10" rx="5" fill="#2f3a4c"/>
    </g>
