      <rect width="188" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <text x="26" y="42" fill="#b9ecff" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="18" font-weight="800">도메인</text>
      <rect x="26" y="62" width="136" height="10" rx="5" fill="#4b5563"/>
      <rect x="26" y="84" width="82" height="10" rx="5" fill="#2f3a4c"/>
