    <text x="83" y="25" text-anchor="middle" fill="#78f0bf" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="16" font-weight="700">SITE REPORT</text>
    <text x="0" y="112" fill="#f8fafc" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="58" font-weight="800">사이트 검증 리포트</text>
    <text x="0" y="162" fill="#aeb9c9" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="25">후기, 제보, 도메인 정보를 한 화면에서 비교</text>

    <g transform="translate(0 228)">
      <rect width="188" height="110" rx="16" fill="#151f2e" stroke="#2e3a4e"/>
      <text x="26" y="42" fill="#78f0bf" font-family="Segoe UI, Malgun Gothic, Arial, sans-serif" font-size="18" font-weight="800">후기</text>
